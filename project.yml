name: StrokeMouse
options:
  bundleIdPrefix: com.strokemouse
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "16.0"
  knownRegions:
    - en
    - zh-Hans
    - Base
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "StrokeMouse Dev"
    PRODUCT_BUNDLE_IDENTIFIER: com.strokemouse.app
packages:
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: "1.1.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
targets:
  StrokeMouse:
    type: application
    platform: macOS
    sources:
      - path: StrokeMouse
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: StrokeMouse
        PRODUCT_BUNDLE_IDENTIFIER: com.strokemouse.app
        APP_DISPLAY_NAME: StrokeMouse
        MARKETING_VERSION: "0.0.4"
        CURRENT_PROJECT_VERSION: "4"
        SPARKLE_PUBLIC_KEY: "__REPLACE_WITH_SPARKLE_PUBLIC_ED_KEY__"
        INFOPLIST_FILE: StrokeMouse/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: StrokeMouse/Supporting/StrokeMouse.entitlements
        CODE_SIGN_IDENTITY: "StrokeMouse Dev"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PROVISIONING_PROFILE_SPECIFIER: ""
        # Avoid debug dylib Team-ID mismatch with local "StrokeMouse Dev" cert.
        ENABLE_DEBUG_DYLIB: NO
      configs:
        # Separate display name + bundle ID so Debug coexists with Release in Accessibility TCC.
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.strokemouse.app.dev
          APP_DISPLAY_NAME: StrokeMouse Dev
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.strokemouse.app
          APP_DISPLAY_NAME: StrokeMouse
    dependencies:
      - package: LaunchAtLogin
        product: LaunchAtLogin
      - package: Sparkle
        product: Sparkle
    scheme:
      testTargets:
        - StrokeMouseTests
  StrokeMouseTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: StrokeMouseTests
    dependencies:
      - target: StrokeMouse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strokemouse.app.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "StrokeMouse Dev"
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: ""
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StrokeMouse.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/StrokeMouse"
        BUNDLE_LOADER: "$(TEST_HOST)"
